name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy preview for'
        required: true
        type: number

jobs:
  post-instructions:
    name: Post deploy instructions
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post comment with deploy instructions
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Preview Deployment\n\nTo deploy a preview of this PR, comment:\n\n\`/deploy-preview\`\n\n_Once deployed, the preview will auto-update on each push._`
            });

  check-auto-deploy:
    name: Check if auto-deploy is enabled
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    permissions:
      pull-requests: read
    steps:
      - name: Check for preview-deployed label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const hasLabel = labels.some(label => label.name === 'preview-deployed');
            core.setOutput('should_deploy', hasLabel ? 'true' : 'false');

  deploy-preview:
    name: Deploy PR Preview to GitHub Pages
    needs: [check-auto-deploy]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/deploy-preview')) ||
      (needs.check-auto-deploy.outputs.should_deploy == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
    concurrency:
      group: pr-preview-${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
      DEMO_PATH: pr-${{ github.event.inputs.pr_number || github.event.issue.number || github.event.pull_request.number }}
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ env.PR_NUMBER }};
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('ref', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - name: Add reaction to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build demo
        run: bun run build:demo

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy to GitHub Pages
        run: |
          rm -rf gh-pages/${{ env.DEMO_PATH }}
          cp -r docs/${{ env.DEMO_PATH }} gh-pages/${{ env.DEMO_PATH }}
          cp packages/ui-demo/public/spa-404.html gh-pages/404.html
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Deploy preview for PR #${{ env.PR_NUMBER }}"
          git push

      - name: Add preview-deployed label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ env.PR_NUMBER }};
            const labelName = 'preview-deployed';

            // Ensure the label exists in the repo
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '1d76db',
                  description: 'PR preview has been deployed'
                });
              }
            }

            // Add the label to the PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [labelName]
            });

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ env.PR_NUMBER }};
            const previewUrl = `https://${{ github.repository_owner }}.github.io/${context.repo.repo}/${{ env.DEMO_PATH }}/`;
            const body = `## 🚀 Preview Deployment\n\nYour preview is ready!\n\n**Preview URL:** ${previewUrl}\n\n_This preview will auto-update on each push._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
