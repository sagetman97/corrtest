name: Markdown lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !.cursor/**
            !docs/reference/company/collateral-extract-notes.md
